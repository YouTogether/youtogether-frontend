# lefthook.yml — youtogether-frontend
#
# Git hooks manager configuration for the Flutter frontend repository.
# Install hooks by running: lefthook install
#
# lefthook was chosen over husky because it has no Node.js dependency
# and integrates natively with any toolchain, including Flutter/Dart.

# ---------------------------------------------------------------------------
# commit-msg
# Validates the commit message against the Conventional Commits 1.0.0
# specification before the commit is accepted.
# ---------------------------------------------------------------------------
commit-msg:
  commands:
    validate-conventional-commit:
      run: |
        # Read the commit message from the file provided by Git.
        MSG=$(cat {1})

        # Conventional Commits pattern:
        #   <type>(<scope>): <description>
        # Types: feat, fix, docs, style, refactor, test, chore, ci, build, perf, revert
        # Scope: optional, must be lowercase alphanumeric with hyphens
        # Description: mandatory, must not start with a capital letter
        PATTERN='^(feat|fix|docs|style|refactor|test|chore|ci|build|perf|revert)(\([a-z][a-z0-9-]*\))?: .{1,100}$'

        # Allow merge commits and revert commits generated by Git itself.
        if echo "$MSG" | grep -qE '^(Merge|Revert) '; then
          exit 0
        fi

        # Allow release-please generated commits.
        if echo "$MSG" | grep -qE '^chore\(main\): release'; then
          exit 0
        fi

        if ! echo "$MSG" | grep -qE "$PATTERN"; then
          echo ""
          echo "ERROR: Commit message does not conform to the Conventional Commits specification."
          echo ""
          echo "Expected format:"
          echo "  <type>(<scope>): <short description>"
          echo ""
          echo "Allowed types: feat, fix, docs, style, refactor, test, chore, ci, build, perf, revert"
          echo "Examples:"
          echo "  feat(auth): implement RegisterUseCase"
          echo "  fix(room): correct ownership check on deletion"
          echo "  test(auth): write unit tests for LoginCubit"
          echo ""
          echo "Received:"
          echo "  $MSG"
          echo ""
          exit 1
        fi

# ---------------------------------------------------------------------------
# pre-push
# Validates the current branch name against the project naming convention
# before any push to the remote.
# Format: <type>/<bounded-context>/<short-description-in-kebab-case>
# ---------------------------------------------------------------------------
pre-push:
  commands:
    validate-branch-name:
      run: |
        BRANCH=$(git rev-parse --abbrev-ref HEAD)

        # Exempt protected and automated branches.
        if echo "$BRANCH" | grep -qE '^(main|HEAD)$'; then
          exit 0
        fi

        # Exempt release-please branches.
        if echo "$BRANCH" | grep -qE '^release-please--'; then
          exit 0
        fi

        # Branch naming pattern:
        #   <type>/<bounded-context>/<description>
        # Type:            feature, fix, hotfix, refactor, test, docs, chore, ci, release
        # Bounded context: auth, room, video-sync, infra, planning (optional segment)
        # Description:     lowercase kebab-case
        PATTERN='^(feature|fix|hotfix|refactor|test|docs|chore|ci|release)/[a-z][a-z0-9-]*(/[a-z][a-z0-9-]*)?$'

        if ! echo "$BRANCH" | grep -qE "$PATTERN"; then
          echo ""
          echo "ERROR: Branch name does not conform to the project naming convention."
          echo ""
          echo "Expected format:"
          echo "  <type>/<bounded-context>/<short-description>"
          echo ""
          echo "Allowed types: feature, fix, hotfix, refactor, test, docs, chore, ci, release"
          echo "Examples:"
          echo "  feature/auth/register-use-case"
          echo "  fix/room/ownership-check"
          echo "  test/video-sync/playback-bloc-unit-tests"
          echo "  chore/infra/update-flutter-sdk"
          echo ""
          echo "Current branch: $BRANCH"
          echo ""
          exit 1
        fi
