name: Bug Report
description: Report a defect or regression
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Clear and concise description of the bug."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Numbered steps to reproduce the behaviour."
      placeholder: |
        1. Navigate to ...
        2. Tap on ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - Major
        - Minor
        - Trivial
    validations:
      required: true
  - type: dropdown
    id: bounded-context
    attributes:
      label: Bounded Context
      options:
        - Authentication
        - Room
        - Video Synchronisation
        - Infrastructure
    validations:
      required: true
