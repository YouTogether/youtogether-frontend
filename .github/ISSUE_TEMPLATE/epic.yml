name: Epic
description: A high-level feature area grouping multiple related issues
title: "[EPIC] "
labels: ["epic"]
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: "Describe the functional perimeter covered by this epic."
    validations:
      required: true
  - type: textarea
    id: completion-criteria
    attributes:
      label: Completion Criteria
      description: "Conditions under which this epic can be considered done."
    validations:
      required: true
  - type: dropdown
    id: bounded-context
    attributes:
      label: Bounded Context
      options:
        - Authentication
        - Room
        - Video Synchronisation
        - Infrastructure
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Target Milestone
      placeholder: "MVP - Authentication"
    validations:
      required: true
